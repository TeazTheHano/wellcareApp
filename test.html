<div>
    <!-- HEADER -->
    <header
        class="fixed top-0 left-0 right-0 z-50 transition-all duration-200 box_shadow_header bg-white/95 backdrop-blur-[16px] border-b border-gray-200">
        <div class="mx-auto max-w-[1280px] px-8 relative">
            <div class="flex items-center justify-between h-20 lg:h-24">

                <!-- LEFT -->
                <div class="flex items-center space-x-8 xl:space-x-10">
                    <!-- LOGO -->
                    <div class="flex-shrink-0">
                        <a href="/" binding-btnhref="header_logo_link" class="flex items-center">
                            <img alt="WellCare365" width="96" height="96" decoding="async"
                                class="h-16 md:h-20 lg:h-24 w-auto object-contain"
                                binding-imgpath="https://static.izzi.asia/images/2025/12/24/2512240549_image16.png"
                                src="https://static.izzi.asia/images/2025/12/24/2512240549_image16.png">
                        </a>
                    </div>

                    <!-- MENU DESKTOP -->
                    <nav class="hidden min-[1430px]:flex items-center space-x-6 lg:space-x-8 xl:space-x-10">
                        <a href="/"
                            class="relative group whitespace-nowrap pb-1 text-base xl:text-lg transition-all duration-150 hover:scale-105 text-primary font-medium"
                            style="opacity:1;" binding-btnhref="/" binding-name="Home">Home<span
                                class="absolute bottom-0 left-0 h-0.5 gradient-primary transition-all duration-300 w-full">
                            </span>
                        </a>
                        <a href="/pages/about-wellcare365"
                            class="relative group whitespace-nowrap pb-1 text-base xl:text-lg transition-all duration-150 hover:scale-105 text-gray-700 hover:text-primary font-light"
                            style="opacity:1;" binding-btnhref="/pages/about-wellcare365"
                            binding-name="About">About<span
                                class="absolute bottom-0 left-0 h-0.5 gradient-primary transition-all duration-300 w-0 group-hover:w-full">
                            </span>
                        </a>
                        <a href="/services.html"
                            class="relative group whitespace-nowrap pb-1 text-base xl:text-lg transition-all duration-150 hover:scale-105 text-gray-700 hover:text-primary font-light"
                            style="opacity:1;" binding-btnhref="/pages/services"
                            binding-name="Privileges">Privileges<span
                                class="absolute bottom-0 left-0 h-0.5 gradient-primary transition-all duration-300 w-0 group-hover:w-full">
                            </span>
                        </a>
                        <a href="/partners.html"
                            class="relative group whitespace-nowrap pb-1 text-base xl:text-lg transition-all duration-150 hover:scale-105 text-gray-700 hover:text-primary font-light"
                            style="opacity:1;" binding-btnhref="/pages/partners" binding-name="Partners">Partners<span
                                class="absolute bottom-0 left-0 h-0.5 gradient-primary transition-all duration-300 w-0 group-hover:w-full">
                            </span>
                        </a>
                        <a href="/news.html"
                            class="relative group whitespace-nowrap pb-1 text-base xl:text-lg transition-all duration-150 hover:scale-105 text-gray-700 hover:text-primary font-light"
                            style="opacity:1;" binding-btnhref="/pages/articles" binding-name="News">News<span
                                class="absolute bottom-0 left-0 h-0.5 gradient-primary transition-all duration-300 w-0 group-hover:w-full">
                            </span>
                        </a>
                        <a href="/contact.html"
                            class="relative group whitespace-nowrap pb-1 text-base xl:text-lg transition-all duration-150 hover:scale-105 text-gray-700 hover:text-primary font-light"
                            style="opacity:1;" binding-btnhref="/pages/contact" binding-name="Contact">Contact<span
                                class="absolute bottom-0 left-0 h-0.5 gradient-primary transition-all duration-300 w-0 group-hover:w-full">
                            </span>
                        </a>
                    </nav>
                </div>

                <!-- RIGHT -->
                <div class="flex items-center space-x-3">

                    <!-- LANGUAGE -->
                    <div class=" relative language-menu-container">
                        <div class="relative">
                            <!-- Button -->
                            <button id="langBtn" class="flex items-center space-x-2 px-3 py-2 rounded-lg transition-all duration-200
                                               font-medium text-sm border bg-gray-100 hover:bg-gray-200
                                               text-gray-700 border-gray-200">

                                <!-- Globe -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10">

                                    </circle>
                                    <path d="M12 2a14.5 14.5 0 0 0 0 20">

                                    </path>
                                    <path d="M2 12h20">

                                    </path>
                                </svg>

                                <span id="currentLang" binding-name="Language">EN</span>

                                <!-- Chevron -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" id="langChevron">
                                    <path d="m6 9 6 6 6-6">

                                    </path>
                                </svg>
                            </button>

                            <!-- Dropdown -->
                            <div id="langDropdown" class="absolute right-0 mt-2 w-32 rounded-xl border bg-white shadow-lg
                                               opacity-0 invisible scale-95 transition-all duration-200 z-50">

                                <button class="lang-item w-full px-4 py-2 text-sm hover:bg-gray-100 rounded-xl"
                                    data-lang="EN" data-url="/en-US">
                                    English
                                </button>

                                <button class="lang-item w-full px-4 py-2 text-sm hover:bg-gray-100 rounded-xl"
                                    data-lang="VI" data-url="/vi-VN">
                                    Tiếng Việt
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- CTA -->

                    <div class="hidden min-[1430px]:flex">
                        <a href="/join.html" binding-btnhref="/pages/join" class="block">
                            <button binding-btntext="Join WellCare365"
                                class="inline-flex items-center justify-center rounded-xl px-4 py-2.5 text-sm font-medium gradient-primary text-white shadow-lg hover:shadow-xl">Join
                                WellCare365 </button>
                        </a>
                    </div>


                    <!-- MOBILE BUTTON -->
                    <div class="min-[1430px]:hidden">
                        <button
                            class="w-10 h-10 rounded-lg flex items-center justify-center bg-gray-100 text-gray-700 hover:bg-gray-200"
                            aria-label="Toggle menu">
                            ☰
                        </button>
                    </div>


                </div>
            </div>
        </div>
    </header>

    <!-- MOBILE MENU -->
    <div id="mobileMenu" class="fixed inset-0 z-[60] bg-white/95 backdrop-blur-md hidden min-[1430px]:hidden">
        <div class="flex flex-col h-full max-w-xl mx-auto px-6 py-8">

            <!-- MOBILE HEADER -->
            <div class="flex items-center justify-between mb-6">
                <a href="/" binding-btnhref="mobile_logo_link">
                    <img binding-imgpath="https://static.izzi.asia/images/2025/12/24/2512240549_image16.png"
                        src="https://static.izzi.asia/images/2025/12/24/2512240549_image16.png" alt="WellCare365"
                        class="h-16 w-auto object-contain">
                </a>
                <button type="button"
                    class="w-9 h-9 rounded-full flex items-center justify-center bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors"
                    aria-label="Close menu" data-mobile-menu-close>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-x">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- MOBILE NAV -->
            <nav class="space-y-2 text-base sm:text-lg text-gray-800">
                <a binding-name="Home" binding-btnhref="/" href="/index.html"
                    class="block px-6 py-4 rounded-2xl text-lg transition-all bg-primary/10 text-primary font-medium">
                    Trang chủ
                </a>
                <a binding-name="About" binding-btnhref="/pages/about-wellcare365" href="/about.html"
                    class="block px-6 py-4 rounded-2xl text-lg transition-all">
                    Giới thiệu
                </a>
                <a binding-name="Services" binding-btnhref="/pages/services" href="/services.html"
                    class="block px-6 py-4 rounded-2xl text-lg transition-all">
                    Đặc quyền
                </a>
                <a binding-name="Partners" binding-btnhref="/pages/partners" href="/partners.html"
                    class="block px-6 py-4 rounded-2xl text-lg transition-all">
                    Đối tác
                </a>
                <a binding-name="News" binding-btnhref="/pages/articles" href="/news.html"
                    class="block px-6 py-4 rounded-2xl text-lg transition-all">
                    Tin tức
                </a>
                <a binding-name="Contact" binding-btnhref="/pages/contact" href="/contact.html"
                    class="block px-6 py-4 rounded-2xl text-lg transition-all">
                    Liên hệ
                </a>
                <div class="block min-[1430px]:hidden relative language-menu-container-mobile px-6 py-2">
                    <div class="relative">
                        <!-- Button -->
                        <button id="langBtnMobile" class="flex items-center space-x-2 px-4 py-3 rounded-xl transition-all duration-200
                                               font-medium text-base border bg-gray-100 hover:bg-gray-200
                                               text-gray-700 border-gray-200 w-full">

                            <!-- Globe -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 2a14.5 14.5 0 0 0 0 20"></path>
                                <path d="M2 12h20"></path>
                            </svg>

                            <span id="currentLangMobile">EN</span>

                            <!-- Chevron -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" id="langChevronMobile" class="ml-auto">
                                <path d="m6 9 6 6 6-6"></path>
                            </svg>
                        </button>

                        <!-- Dropdown -->
                        <div id="langDropdownMobile" class="absolute left-0 right-0 mt-2 w-full rounded-xl border bg-white shadow-lg
                                               opacity-0 invisible scale-95 transition-all duration-200 z-50">

                            <button
                                class="lang-item-mobile w-full px-4 py-3 text-base hover:bg-gray-100 rounded-t-xl first:rounded-t-xl"
                                data-lang="EN" data-url="/en-US">
                                English
                            </button>

                            <button class="lang-item-mobile w-full px-4 py-3 text-base hover:bg-gray-100 rounded-b-xl"
                                data-lang="VI" data-url="/vi-VN">
                                Tiếng Việt
                            </button>
                        </div>
                    </div>
                </div>
                <div class>
                    <a href="/join.html" binding-btnhref="/pages/join" class="block">
                        <button binding-name="Join WellCare365"
                            class="w-full inline-flex items-center justify-center rounded-2xl py-4 text-base font-medium transition-all duration-300 gradient-primary text-white shadow-lg hover:shadow-xl">
                            Tham gia WellCare365
                        </button>
                    </a>
                </div>
            </nav>
        </div>
    </div>

</div>
